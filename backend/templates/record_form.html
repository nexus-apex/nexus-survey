{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Record | NexusSurvey{% endblock %}
{% block page_title %}{% if editing %}Edit Record{% else %}New Record{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}" required>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Record</button>
      <a href="/records/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
