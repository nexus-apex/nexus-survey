{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Survey | NexusSurvey{% endblock %}
{% block page_title %}{% if editing %}Edit Survey{% else %}New Survey{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ record.category|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="closed" {% if record.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Responses</label>
        <input type="number" name="responses" value="{{ record.responses|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Created Date</label>
        <input type="date" name="created_date" value="{{ record.created_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Deadline</label>
        <input type="date" name="deadline" value="{{ record.deadline|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Survey</button>
      <a href="/surveys/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
